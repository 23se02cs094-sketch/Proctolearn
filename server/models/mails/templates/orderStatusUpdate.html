<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status Update</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; }
        .content { padding: 30px; }
        .content h2 { color: #333; }
        .content p { color: #666; line-height: 1.6; }
        .status-box { background-color: #f8f9fa; border-left: 4px solid #667eea; padding: 20px; margin: 20px 0; }
        .status { font-size: 24px; font-weight: bold; color: #667eea; }
        .button { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px 30px; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .footer { background-color: #f8f9fa; padding: 20px; text-align: center; color: #999; font-size: 12px; }
        .timeline { margin: 20px 0; }
        .timeline-item { padding: 10px 0 10px 30px; border-left: 2px solid #dee2e6; position: relative; }
        .timeline-item.active { border-left-color: #667eea; }
        .timeline-item::before { content: ''; width: 12px; height: 12px; background: #dee2e6; border-radius: 50%; position: absolute; left: -7px; top: 15px; }
        .timeline-item.active::before { background: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Order Update</h1>
        </div>
        <div class="content">
            <h2>Hi {{name}},</h2>
            <p>Your order status has been updated!</p>
            
            <div class="status-box">
                <p style="margin: 0; color: #666;">Order ID: <strong>{{orderId}}</strong></p>
                <p class="status">{{status}}</p>
                <p style="margin: 0; color: #666;">{{note}}</p>
            </div>

            <p style="text-align: center;">
                <a href="{{frontendUrl}}/orders/{{orderDocId}}" class="button">Track Your Order</a>
            </p>
            
            <p>Thank you for shopping with us!</p>
            <p>The Resin World Team</p>
        </div>
        <div class="footer">
            <p>© 2024 The Resin World. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
